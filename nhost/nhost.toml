[global]

[[global.environment]]
name = 'OPENROUTER_API_KEY'
value = '{{ secrets.OPENROUTER_API_KEY }}'


[hasura]
version = 'v2.48.10-ce'
adminSecret = '{{ secrets.HASURA_GRAPHQL_ADMIN_SECRET }}'
webhookSecret = '{{ secrets.NHOST_WEBHOOK_SECRET }}'

[[hasura.jwtSecrets]]
type = 'RS256'
key = '{{ secrets.NHOST_JWT_PUBLIC_KEY }}'
signingKey = '{{ secrets.NHOST_JWT_PRIVATE_KEY }}'
kid = '{{ secrets.NHOST_JWT_KID }}'

[hasura.settings]
corsDomain = ['*']
devMode = true
enableAllowList = false
enableConsole = true
enableRemoteSchemaPermissions = false
enabledAPIs = ['metadata', 'graphql', 'pgdump', 'config']
inferFunctionPermissions = true
liveQueriesMultiplexedRefetchInterval = 1000
stringifyNumericTypes = false

[hasura.logs]
level = 'warn'

[hasura.events]
httpPoolSize = 100

[functions]
[functions.node]
version = 22

[auth]
version = '0.49.1'

[auth.elevatedPrivileges]
mode = 'disabled'

[auth.redirections]
clientUrl = 'http://localhost:5173'
allowedUrls = [
  'http://localhost:3000',
  'http://localhost:3000/',
  'http://localhost:3000/**',
  'http://localhost:5173',
  'http://localhost:5173/',
  'http://localhost:5173/**',
  'http://localhost:5174',
  'http://localhost:5174/',
  'http://localhost:5174/**',
  'http://localhost:5175',
  'http://localhost:5175/',
  'http://localhost:5175/**',
  'http://localhost:5176',
  'http://localhost:5176/',
  'http://localhost:5176/**',
  'https://youtube-summarizer-ai-nine.vercel.app',
  'https://youtube-summarizer-ai-nine.vercel.app/',
  'https://youtube-summarizer-ai-nine.vercel.app/**',
  'https://*.vercel.app',
  'https://*.vercel.app/**'
]

[auth.signUp]
enabled = true
disableNewUsers = false
disableAutoSignup = false

[auth.user]
[auth.user.roles]
default = 'user'
allowed = ['user', 'me']

[auth.user.locale]
default = 'en'
allowed = ['en']

[auth.user.gravatar]
enabled = true
default = 'blank'
rating = 'g'

[auth.user.email]

[auth.user.emailDomains]

[auth.session]
[auth.session.accessToken]
expiresIn = 900

[auth.session.refreshToken]
expiresIn = 2592000

[auth.method]
[auth.method.anonymous]
enabled = false

[auth.method.emailPasswordless]
enabled = false

[auth.method.otp]
[auth.method.otp.email]
enabled = true

[auth.method.emailPassword]
hibpEnabled = false
emailVerificationRequired = false
passwordMinLength = 9

[auth.method.smsPasswordless]
enabled = false

[auth.method.oauth]
[auth.method.oauth.apple]
enabled = false

[auth.method.oauth.azuread]
tenant = 'common'
enabled = false

[auth.method.oauth.bitbucket]
enabled = false

[auth.method.oauth.discord]
enabled = false

[auth.method.oauth.entraid]
tenant = 'common'
enabled = false

[auth.method.oauth.facebook]
enabled = false

[auth.method.oauth.github]
enabled = false

[auth.method.oauth.gitlab]
enabled = false

[auth.method.oauth.google]
enabled = true
clientId = '{{ secrets.GOOGLE_CLIENT_ID }}'
clientSecret = '{{ secrets.GOOGLE_CLIENT_SECRET }}'

[auth.method.oauth.linkedin]
enabled = false

[auth.method.oauth.spotify]
enabled = false

[auth.method.oauth.strava]
enabled = false

[auth.method.oauth.twitch]
enabled = false

[auth.method.oauth.twitter]
enabled = false

[auth.method.oauth.windowslive]
enabled = false

[auth.method.oauth.workos]
enabled = false

[auth.method.webauthn]
enabled = false

[auth.method.webauthn.attestation]
timeout = 60000

[auth.totp]
enabled = false

[auth.oauth2Provider]
enabled = false

[auth.oauth2Provider.accessToken]
expiresIn = 900

[auth.oauth2Provider.refreshToken]
expiresIn = 2592000

[auth.oauth2Provider.clientIdMetadataDocument]
enabled = false

[auth.misc]
concealErrors = false

[auth.rateLimit]
[auth.rateLimit.emails]
limit = 10
interval = '1h'

[auth.rateLimit.sms]
limit = 10
interval = '1h'

[auth.rateLimit.bruteForce]
limit = 1000000
interval = '1m'

[auth.rateLimit.signups]
limit = 1000000
interval = '1m'

[auth.rateLimit.global]
limit = 1000000
interval = '1m'

[auth.rateLimit.oauth2Server]
limit = 1000000
interval = '1m'

[postgres]
version = '14.20-20251217-1'

[postgres.resources]
[postgres.resources.storage]
capacity = 1

[provider]

[storage]
version = '0.14.0'

[observability]
[observability.grafana]
adminPassword = '{{ secrets.GRAFANA_ADMIN_PASSWORD }}'

[observability.grafana.alerting]
enabled = false

[observability.grafana.contacts]
