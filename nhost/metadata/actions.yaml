actions:
  - name: summarizeVideo
    definition:
      kind: synchronous
      handler: '{{NHOST_FUNCTIONS_URL}}/summarize'
      forward_client_headers: true
    permissions:
      - role: user
custom_types:
  enums: []
  input_objects: []
  objects:
    - name: SummarizeVideoResponse
      fields:
        - name: id
          type: String!
        - name: videoTitle
          type: String!
        - name: channelTitle
          type: String!
        - name: thumbnailUrl
          type: String!
        - name: duration
          type: Int!
        - name: summary
          type: String!
        - name: modelUsed
          type: String
  scalars: []
